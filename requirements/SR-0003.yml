uid: SR-0003
type: system_requirement
status: approved
title: Output encoding for an HTTP response
text: Verify that output encoding for an HTTP response, HTML document, or XML document
  is relevant for the context required, such as encoding the relevant characters for
  HTML elements, HTML attributes, HTML comments, CSS, or HTTP header fields, to avoid
  changing the message or document structure.
