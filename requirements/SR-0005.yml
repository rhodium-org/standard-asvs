title: Output encoding or escaping is used when dynamically building JavaScript content
  (including JSON)
text: Verify that output encoding or escaping is used when dynamically building JavaScript
  content (including JSON), to avoid changing the message or document structure (to
  avoid JavaScript and JSON injection).
