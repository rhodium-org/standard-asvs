title: The application avoids the use of eval() or other dynamic code execution features
  such as Spring
text: Verify that the application avoids the use of eval() or other dynamic code execution
  features such as Spring Expression Language (SpEL). Where there is no alternative,
  any user input being included must be sanitized before being executed.
