uid: SR-0018
type: system_requirement
status: approved
title: The application protects against Server-side Request Forgery (SSRF) attacks
text: Verify that the application protects against Server-side Request Forgery (SSRF)
  attacks, by validating untrusted data against an allowlist of protocols, domains,
  paths and ports and sanitizing potentially dangerous characters before using the
  data to call another service.
