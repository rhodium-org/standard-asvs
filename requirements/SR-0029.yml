uid: SR-0029
type: system_requirement
status: approved
title: Deserialization of untrusted data enforces safe input handling
text: Verify that deserialization of untrusted data enforces safe input handling,
  such as using an allowlist of object types or restricting client-defined object
  types, to prevent deserialization attacks. Deserialization mechanisms that are explicitly
  defined as insecure must not be used with untrusted input.
