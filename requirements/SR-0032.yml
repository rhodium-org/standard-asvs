uid: SR-0032
type: system_requirement
status: approved
title: Application components verify the authenticity of each side in a communication
  link to prevent
text: Verify that application components verify the authenticity of each side in a
  communication link to prevent person-in-the-middle attacks. For example, application
  components should validate TLS certificates and chains.
