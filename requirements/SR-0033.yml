uid: SR-0033
type: system_requirement
status: approved
title: A source code control system is in use
text: Verify that a source code control system is in use, with procedures to ensure
  that check-ins are accompanied by issues or change tickets. The source code control
  system should have access control and identifiable users to allow traceability of
  any changes.
