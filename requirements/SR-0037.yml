uid: SR-0037
type: system_requirement
status: approved
title: User-uploaded files - if required to be displayed or downloaded from the application
  - are served
text: Verify that user-uploaded files - if required to be displayed or downloaded
  from the application - are served by either octet stream downloads, or from an unrelated
  domain, such as a cloud file storage bucket. Implement a suitable Content Security
  Policy (CSP) to reduce the risk from XSS vectors or other attacks from the uploaded
  file.
