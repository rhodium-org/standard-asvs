uid: SR-0044
type: system_requirement
status: approved
title: Application documentation states the expected security features that browsers
  using the application
text: Verify that application documentation states the expected security features
  that browsers using the application must support (such as HTTPS, HTTP Strict Transport
  Security (HSTS), Content Security Policy (CSP), and other relevant HTTP security
  mechanisms). It must also define how the application must behave when some of these
  features are not available (such as warning the user or blocking access).
