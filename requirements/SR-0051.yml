uid: SR-0051
type: system_requirement
status: approved
title: If the value of a cookie is not meant to be accessible to client-side scripts
  (such as a session
text: Verify that if the value of a cookie is not meant to be accessible to client-side
  scripts (such as a session token), the cookie must have the 'HttpOnly' attribute
  set and the same value (e. g. session token) must only be transferred to the client
  via the 'Set-Cookie' header field.
