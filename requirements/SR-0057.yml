uid: SR-0057
type: system_requirement
status: approved
title: The application sets a referrer policy to prevent leakage of technically sensitive
  data to
text: Verify that the application sets a referrer policy to prevent leakage of technically
  sensitive data to third-party services via the 'Referer' HTTP request header field.
  This can be done using the Referrer-Policy HTTP response header field or via HTML
  element attributes. Sensitive data could include path and query data in the URL,
  and for internal non-public applications also the hostname.
