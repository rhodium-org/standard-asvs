uid: SR-0058
type: system_requirement
status: approved
title: The web application uses the frame-ancestors directive of the Content-Security-Policy
  header field
text: Verify that the web application uses the frame-ancestors directive of the Content-Security-Policy
  header field for every HTTP response to ensure that it cannot be embedded by default
  and that embedding of specific resources is allowed only when necessary. Note that
  the X-Frame-Options header field, although supported by browsers, is obsolete and
  may not be relied upon.
