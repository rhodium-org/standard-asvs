uid: SR-0059
type: system_requirement
status: approved
title: System generated initial passwords or activation codes SHOULD be securely randomly
  generated
text: Verify system generated initial passwords or activation codes SHOULD be securely
  randomly generated, SHOULD be at least 6 characters long, and MAY contain letters
  and numbers, and expire after a short period of time. These initial secrets must
  not be permitted to become the long term password.
