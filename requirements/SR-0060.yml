uid: SR-0060
type: system_requirement
status: approved
title: All HTTP responses that initiate a document rendering (such as responses with
  Content-Type
text: Verify that all HTTP responses that initiate a document rendering (such as responses
  with Content-Type text/html), include the Cross‑Origin‑Opener‑Policy header field
  with the same-origin directive or the same-origin-allow-popups directive as required.
  This prevents attacks that abuse shared access to Window objects, such as tabnabbing
  and frame counting.
