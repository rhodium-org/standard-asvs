uid: SR-0062
type: system_requirement
status: approved
title: That
text: Verify that, if the application relies on the CORS preflight mechanism to prevent
  disallowed cross-origin use of sensitive functionality, it is not possible to call
  the functionality with a request which does not trigger a CORS-preflight request.
  This may require checking the values of the 'Origin' and 'Content-Type' request
  header fields or using an extra header field that is not a CORS-safelisted header-field.
