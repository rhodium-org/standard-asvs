uid: SR-0063
type: system_requirement
status: approved
title: The salt is at least 32 bits in length and be chosen arbitrarily to minimize
  salt value collisions
text: Verify that the salt is at least 32 bits in length and be chosen arbitrarily
  to minimize salt value collisions among stored hashes. For each credential, a unique
  salt value and the resulting hash SHALL be stored.
