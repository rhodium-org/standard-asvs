uid: SR-0069
type: system_requirement
status: approved
title: Client-side assets
text: Verify that client-side assets, such as JavaScript libraries, CSS, or web fonts,
  are only hosted externally (e.g., on a Content Delivery Network) if the resource
  is static and versioned and Subresource Integrity (SRI) is used to validate the
  integrity of the asset. If this is not possible, there should be a documented security
  decision to justify this for each resource.
