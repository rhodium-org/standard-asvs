uid: SR-0070
type: system_requirement
status: approved
title: The application only uses client-side technologies which are still supported
  and considered secure
text: Verify that the application only uses client-side technologies which are still
  supported and considered secure. Examples of technologies which do not meet this
  requirement include NSAPI plugins, Flash, Shockwave, ActiveX, Silverlight, NACL,
  or client-side Java applets.
