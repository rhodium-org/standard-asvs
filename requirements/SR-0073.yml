uid: SR-0073
type: system_requirement
status: approved
title: The application's top-level domain (e
text: Verify that the application's top-level domain (e.g., site.tld) is added to
  the public preload list for HTTP Strict Transport Security (HSTS). This ensures
  that the use of TLS for the application is built directly into the main browsers,
  rather than relying only on the Strict-Transport-Security response header field.
