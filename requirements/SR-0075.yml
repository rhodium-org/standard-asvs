title: Lookup secrets have sufficient randomness (112 bits of entropy)
text: Verify that lookup secrets have sufficient randomness (112 bits of entropy),
  or if less than 112 bits of entropy, salted with a unique and random 32-bit salt
  and hashed with an approved one-way hash.
