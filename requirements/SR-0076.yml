uid: SR-0076
type: system_requirement
status: approved
title: Only user-facing endpoints (intended for manual web-browser access) automatically
  redirect from
text: Verify that only user-facing endpoints (intended for manual web-browser access)
  automatically redirect from HTTP to HTTPS, while other services or endpoints do
  not implement transparent redirects. This is to avoid a situation where a client
  is erroneously sending unencrypted HTTP requests, but since the requests are being
  automatically redirected to HTTPS, the leakage of sensitive data goes undiscovered.
