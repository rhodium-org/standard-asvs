title: The application does not send nor accept HTTP/2 or HTTP/3 messages with connection-specific
  header
text: Verify that the application does not send nor accept HTTP/2 or HTTP/3 messages
  with connection-specific header fields such as Transfer-Encoding to prevent response
  splitting and header injection attacks.
