title: Cryptographic keys used in verification are stored securely and protected against
  disclosure
text: Verify that cryptographic keys used in verification are stored securely and
  protected against disclosure, such as using a Trusted Platform Module (TPM) or Hardware
  Security Module (HSM), or an OS service that can use this secure storage.
