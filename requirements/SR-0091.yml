uid: SR-0091
type: system_requirement
status: approved
title: The documentation defines the permitted file types
text: Verify that the documentation defines the permitted file types, expected file
  extensions, and maximum size (including unpacked size) for each upload feature.
  Additionally, ensure that the documentation specifies how files are made safe for
  end-users to download and process, such as how the application behaves when a malicious
  file is detected.
