uid: SR-0099
type: system_requirement
status: approved
title: When the application creates file paths for file operations
text: Verify that when the application creates file paths for file operations, instead
  of user-submitted filenames, it uses internally generated or trusted data, or if
  user-submitted filenames or file metadata must be used, strict validation and sanitization
  must be applied. This is to protect against path traversal, local or remote file
  inclusion (LFI, RFI), and server-side request forgery (SSRF) attacks.
