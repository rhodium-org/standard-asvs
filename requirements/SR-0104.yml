uid: SR-0104
type: system_requirement
status: approved
title: Application documentation defines how controls such as rate limiting
text: Verify that application documentation defines how controls such as rate limiting,
  anti-automation, and adaptive response, are used to defend against attacks such
  as credential stuffing and password brute force. The documentation must make clear
  how these controls are configured and prevent malicious account lockout.
