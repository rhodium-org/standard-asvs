uid: SR-0111
type: system_requirement
status: approved
title: Passwords of any composition can be used
text: Verify that passwords of any composition can be used, without rules limiting
  the type of characters permitted. There must be no requirement for a minimum number
  of upper or lower case characters, numbers, or special characters.
