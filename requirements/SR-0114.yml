title: Relying Parties (RPs) specify the maximum authentication time to Credential
  Service Providers
text: Verify that Relying Parties (RPs) specify the maximum authentication time to
  Credential Service Providers (CSPs) and that CSPs re-authenticate the user if they
  haven't used a session within that period.
