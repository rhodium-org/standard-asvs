title: Credential Service Providers (CSPs) inform Relying Parties (RPs) of the last
  authentication event
text: Verify that Credential Service Providers (CSPs) inform Relying Parties (RPs)
  of the last authentication event, to allow RPs to determine if they need to re-authenticate
  the user.
