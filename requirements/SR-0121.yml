uid: SR-0121
type: system_requirement
status: approved
title: Sensitive data and APIs are protected against Insecure Direct Object Reference
  (IDOR) attacks
text: Verify that sensitive data and APIs are protected against Insecure Direct Object
  Reference (IDOR) attacks targeting creation, reading, updating and deletion of records,
  such as creating or updating someone else's record, viewing everyone's records,
  or deleting all records.
