uid: SR-0121
type: system_requirement
status: approved
title: Either a multi-factor authentication mechanism or a combination of single-factor
  authentication
text: Verify that either a multi-factor authentication mechanism or a combination
  of single-factor authentication mechanisms, must be used in order to access the
  application. For L3, one of the factors must be a hardware-based authentication
  mechanism which provides compromise and impersonation resistance against phishing
  attacks while verifying the intent to authenticate by requiring a user-initiated
  action (such as a button press on a FIDO hardware key or a mobile phone). Relaxing
  any of the considerations in this requirement requires a fully documented rationale
  and a comprehensive set of mitigating controls.
