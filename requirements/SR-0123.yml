uid: SR-0123
type: system_requirement
status: approved
title: Users are notified of suspicious authentication attempts (successful or unsuccessful)
text: Verify that users are notified of suspicious authentication attempts (successful
  or unsuccessful). This may include authentication attempts from an unusual location
  or client, partially successful authentication (only one of multiple factors), an
  authentication attempt after a long period of inactivity or a successful authentication
  after several unsuccessful attempts.
