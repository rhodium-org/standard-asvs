uid: SR-0124
type: system_requirement
status: approved
title: Directory browsing is disabled unless deliberately desired
text: Verify that directory browsing is disabled unless deliberately desired. Additionally,
  applications should not allow discovery or disclosure of file or directory metadata,
  such as Thumbs.db, .DS_Store, .git or .svn folders.
