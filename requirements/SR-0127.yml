uid: SR-0127
type: system_requirement
status: approved
title: System generated initial passwords or activation codes are securely randomly
  generated
text: Verify that system generated initial passwords or activation codes are securely
  randomly generated, follow the existing password policy, and expire after a short
  period of time or after they are initially used. These initial secrets must not
  be permitted to become the long term password.
