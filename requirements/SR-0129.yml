title: Structured data is strongly typed and validated against a defined schema including
  allowed
text: Verify that structured data is strongly typed and validated against a defined
  schema including allowed characters, length and pattern (e.g. credit card numbers,
  e-mail addresses, telephone numbers, or validating that two related fields are reasonable,
  such as checking that suburb and zip/postcode match).
