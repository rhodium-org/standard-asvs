uid: SR-0132
type: system_requirement
status: approved
title: Administrative users can initiate the password reset process for the user
text: Verify that administrative users can initiate the password reset process for
  the user, but that this does not allow them to change or choose the user's password.
  This prevents a situation where they know the user's password.
