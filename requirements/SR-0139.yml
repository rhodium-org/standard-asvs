uid: SR-0139
type: system_requirement
status: approved
title: Output encoding is relevant for the interpreter and context required
text: Verify that output encoding is relevant for the interpreter and context required.
  For example, use encoders specifically for HTML values, HTML attributes, JavaScript,
  URL parameters, HTTP headers, SMTP, and others as the context requires, especially
  from untrusted inputs (e.g. names with Unicode or apostrophes, such as ねこ or O'Hara).
