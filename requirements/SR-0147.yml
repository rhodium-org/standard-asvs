uid: SR-0147
type: system_requirement
status: approved
title: That
text: Verify that, if the application supports multiple identity providers (IdPs),
  the user's identity cannot be spoofed via another supported identity provider (eg.
  by using the same user identifier). The standard mitigation would be for the application
  to register and identify the user using a combination of the IdP ID (serving as
  a namespace) and the user's ID in the IdP.
