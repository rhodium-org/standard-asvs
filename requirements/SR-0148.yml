title: The presence and integrity of digital signatures on authentication assertions
  (for example on JWTs
text: Verify that the presence and integrity of digital signatures on authentication
  assertions (for example on JWTs or SAML assertions) are always validated, rejecting
  any assertions that are unsigned or have invalid signatures.
