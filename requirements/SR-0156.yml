uid: SR-0156
type: system_requirement
status: approved
title: If reference tokens are used to represent user sessions
text: Verify that if reference tokens are used to represent user sessions, they are
  unique and generated using a cryptographically secure pseudo-random number generator
  (CSPRNG) and possess at least 128 bits of entropy.
