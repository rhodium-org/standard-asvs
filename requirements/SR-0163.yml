uid: SR-0163
type: system_requirement
status: approved
title: Known insecure block modes (i
text: Verify that known insecure block modes (i.e. ECB, etc.), padding modes (i.e.
  PKCS#1 v1.5, etc.), ciphers with small block sizes (i.e. Triple-DES, Blowfish, etc.),
  and weak hashing algorithms (i.e. MD5, SHA1, etc.) are not used unless required
  for backwards compatibility.
