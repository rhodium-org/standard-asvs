title: The application requires full re-authentication before allowing modifications
  to sensitive account
text: Verify that the application requires full re-authentication before allowing
  modifications to sensitive account attributes which may affect authentication such
  as email address, phone number, MFA configuration, or other information used in
  account recovery.
