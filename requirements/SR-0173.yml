title: Authentication and authorization documentation defines how environmental and
  contextual factors are
text: Verify that authentication and authorization documentation defines how environmental
  and contextual factors are used in decision-making, in addition to function-level,
  data-specific, and field-level authorization. This should include the attributes
  evaluated, thresholds for risk, and actions taken (e.g., allow, challenge, deny,
  step-up authentication).
