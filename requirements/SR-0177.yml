title: Adaptive security controls based on a consumer's environmental and contextual
  attributes (such as
text: Verify that adaptive security controls based on a consumer's environmental and
  contextual attributes (such as time of day, location, IP address, or device) are
  implemented for authentication and authorization decisions, as defined in the application's
  documentation. These controls must be applied when the consumer tries to start a
  new session and also during an existing session.
