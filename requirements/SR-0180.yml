uid: SR-0180
type: system_requirement
status: approved
title: Access to an object is based on the originating subject's (e
text: Verify that access to an object is based on the originating subject's (e.g.
  consumer's) permissions, not on the permissions of any intermediary or service acting
  on their behalf. For example, if a consumer calls a web service using a self-contained
  token for authentication, and the service then requests data from a different service,
  the second service will use the consumer's token, rather than a machine-to-machine
  token from the first service, to make permission decisions.
