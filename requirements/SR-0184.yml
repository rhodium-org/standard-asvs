uid: SR-0184
type: system_requirement
status: approved
title: Only algorithms on an allowlist can be used to create and verify self-contained
  tokens
text: Verify that only algorithms on an allowlist can be used to create and verify
  self-contained tokens, for a given context. The allowlist must include the permitted
  algorithms, ideally only either symmetric or asymmetric algorithms, and must not
  include the 'None' algorithm. If both symmetric and asymmetric must be supported,
  additional controls will be needed to prevent key confusion.
