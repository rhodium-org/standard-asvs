title: If an access control decision requires identifying a unique user from an access
  token (JWT or
text: Verify that if an access control decision requires identifying a unique user
  from an access token (JWT or related token introspection response), the resource
  server identifies the user from claims that cannot be reassigned to other users.
  Typically, it means using a combination of 'iss' and 'sub' claims.
