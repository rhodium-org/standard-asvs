title: The resource server prevents the use of stolen access tokens or replay of access
  tokens (from
text: Verify that the resource server prevents the use of stolen access tokens or
  replay of access tokens (from unauthorized parties) by requiring sender-constrained
  access tokens, either Mutual TLS for OAuth 2 or OAuth 2 Demonstration of Proof of
  Possession (DPoP).
