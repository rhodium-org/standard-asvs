uid: SR-0204
type: system_requirement
status: approved
title: The authorization server mitigates refresh token replay attacks for public
  clients
text: Verify that the authorization server mitigates refresh token replay attacks
  for public clients, preferably using sender-constrained refresh tokens, i.e., Demonstrating
  Proof of Possession (DPoP) or Certificate-Bound Access Tokens using mutual TLS (mTLS).
  For L1 and L2 applications, refresh token rotation may be used. If refresh token
  rotation is used, the authorization server must invalidate the refresh token after
  usage, and revoke all refresh tokens for that authorization if an already used and
  invalidated refresh token is provided.
