uid: SR-0211
type: system_requirement
status: approved
title: For a given client
text: Verify that for a given client, the authorization server only allows the 'response_mode'
  value that this client needs to use. For example, by having the authorization server
  validate this value against the expected values or by using pushed authorization
  request (PAR) or JWT-secured Authorization Request (JAR).
