uid: SR-0212
type: system_requirement
status: approved
title: The application source code and third party libraries do not contain back doors
text: Verify that the application source code and third party libraries do not contain
  back doors, such as hard-coded or additional undocumented accounts or keys, code
  obfuscation, undocumented binary blobs, rootkits, or anti-debugging, insecure debugging
  features, or otherwise out of date, insecure, or hidden functionality that could
  be used maliciously if discovered.
