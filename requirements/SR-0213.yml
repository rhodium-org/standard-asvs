title: The authorization server issues only sender-constrained (Proof-of-Possession)
  access tokens
text: Verify that the authorization server issues only sender-constrained (Proof-of-Possession)
  access tokens, either with certificate-bound access tokens using mutual TLS (mTLS)
  or DPoP-bound access tokens (Demonstration of Proof of Possession).
