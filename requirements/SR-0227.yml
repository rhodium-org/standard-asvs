uid: SR-0227
type: system_requirement
status: approved
title: A cryptographic inventory is performed
text: Verify that a cryptographic inventory is performed, maintained, regularly updated,
  and includes all cryptographic keys, algorithms, and certificates used by the application.
  It must also document where keys can and cannot be used in the system, and the types
  of data that can and cannot be protected using the keys.
