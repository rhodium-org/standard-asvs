uid: SR-0231
type: system_requirement
status: approved
title: The application is designed with crypto agility such that random number
text: Verify that the application is designed with crypto agility such that random
  number, authenticated encryption, MAC, or hashing algorithms, key lengths, rounds,
  ciphers and modes can be reconfigured, upgraded, or swapped at any time, to protect
  against cryptographic breaks. Similarly, it must also be possible to replace keys
  and passwords and re-encrypt data. This will allow for seamless upgrades to post-quantum
  cryptography (PQC), once high-assurance implementations of approved PQC schemes
  or standards are widely available.
