uid: SR-0234
type: system_requirement
status: approved
title: The application protects against Reflective File Download (RFD) by validating
  or ignoring
text: Verify that the application protects against Reflective File Download (RFD)
  by validating or ignoring user-submitted filenames in a JSON, JSONP, or URL parameter,
  the response Content-Type header should be set to text/plain, and the Content-Disposition
  header should have a fixed filename.
