uid: SR-0241
type: system_requirement
status: approved
title: Passwords are stored using an approved
text: Verify that passwords are stored using an approved, computationally intensive,
  key derivation function (also known as a "password hashing function"), with parameter
  settings configured based on current guidance. The settings should balance security
  and performance to make brute-force attacks sufficiently challenging for the required
  level of security.
