title: Approved cryptographic algorithms are used for key exchange (such as Diffie-Hellman)
  with a focus
text: Verify that approved cryptographic algorithms are used for key exchange (such
  as Diffie-Hellman) with a focus on ensuring that key exchange mechanisms use secure
  parameters. This will prevent attacks on the key establishment process which could
  lead to adversary-in-the-middle attacks or cryptographic breaks.
