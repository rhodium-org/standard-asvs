title: A query allow list or a combination of depth limiting and amount limiting is
  used to prevent
text: Verify that a query allow list or a combination of depth limiting and amount
  limiting is used to prevent GraphQL or data layer expression Denial of Service (DoS)
  as a result of expensive, nested queries. For more advanced scenarios, query cost
  analysis should be used.
