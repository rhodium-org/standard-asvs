title: An encrypted protocol such as TLS is used for all inbound and outbound connections
  to and from the
text: Verify that an encrypted protocol such as TLS is used for all inbound and outbound
  connections to and from the application, including monitoring systems, management
  tools, remote access and SSH, middleware, databases, mainframes, partner systems,
  or external APIs. The server must not fall back to insecure or unencrypted protocols.
