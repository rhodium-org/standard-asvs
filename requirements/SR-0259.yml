title: TLS or another appropriate transport encryption mechanism used for all connectivity
  between internal
text: Verify that TLS or another appropriate transport encryption mechanism used for
  all connectivity between internal, HTTP-based services within the application, and
  does not fall back to insecure or unencrypted communications.
