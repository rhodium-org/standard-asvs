uid: SR-0260
type: system_requirement
status: approved
title: TLS connections between internal services use trusted certificates
text: Verify that TLS connections between internal services use trusted certificates.
  Where internally generated or self-signed certificates are used, the consuming service
  must be configured to only trust specific internal CAs and specific self-signed
  certificates.
