uid: SR-0261
type: system_requirement
status: approved
title: Services communicating internally within a system (intra-service communications)
  use strong
text: Verify that services communicating internally within a system (intra-service
  communications) use strong authentication to ensure that each endpoint is verified.
  Strong authentication methods, such as TLS client authentication, must be employed
  to ensure identity, using public-key infrastructure and mechanisms that are resistant
  to replay attacks. For microservice architectures, consider using a service mesh
  to simplify certificate management and enhance security.
