uid: SR-0268
type: system_requirement
status: approved
title: Every HTTP response contains a Content-Type header
text: Verify that every HTTP response contains a Content-Type header. Also specify
  a safe character set (e.g., UTF-8, ISO-8859-1) if the content types are text/*,
  /+xml and application/xml. Content must match with the provided Content-Type header.
