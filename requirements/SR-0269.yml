title: An allowlist is used to define the external resources or systems with which
  the application is
text: Verify that an allowlist is used to define the external resources or systems
  with which the application is permitted to communicate (e.g., for outbound requests,
  data loads, or file access). This allowlist can be implemented at the application
  layer, web server, firewall, or a combination of different layers.
