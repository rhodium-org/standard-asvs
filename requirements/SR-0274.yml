uid: SR-0274
type: system_requirement
status: approved
title: The content of a web application cannot be embedded in a third-party site by
  default and that
text: 'Verify that the content of a web application cannot be embedded in a third-party
  site by default and that embedding of the exact resources is only allowed where
  necessary by using suitable Content-Security-Policy: frame-ancestors and X-Frame-Options
  response headers.'
