title: Controls around sensitive data related to encryption
text: Verify that controls around sensitive data related to encryption, integrity
  verification, retention, how the data is to be logged, access controls around sensitive
  data in logs, privacy and privacy-enhancing technologies, are implemented as defined
  in the documentation for the specific data's protection level.
