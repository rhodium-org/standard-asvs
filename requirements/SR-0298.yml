uid: SR-0298
type: system_requirement
status: approved
title: The application documentation identifies functionality which is time-consuming
  or resource-demanding
text: Verify that the application documentation identifies functionality which is
  time-consuming or resource-demanding. This must include how to prevent a loss of
  availability due to overusing this functionality and how to avoid a situation where
  building a response takes longer than the consumer's timeout. Potential defenses
  may include asynchronous processing, using queues, and limiting parallel processes
  per user and per application.
