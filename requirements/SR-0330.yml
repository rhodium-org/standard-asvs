title: A generic message is returned to the consumer when an unexpected or security-sensitive
  error occurs
text: Verify that a generic message is returned to the consumer when an unexpected
  or security-sensitive error occurs, ensuring no exposure of sensitive internal system
  data such as stack traces, queries, secret keys, and tokens.
