title: The Traversal Using Relays around NAT (TURN) service only allows access to
  IP addresses that are
text: Verify that the Traversal Using Relays around NAT (TURN) service only allows
  access to IP addresses that are not reserved for special purposes (e.g., internal
  networks, broadcast, loopback). Note that this applies to both IPv4 and IPv6 addresses.
