title: The media server is configured to use and support approved Datagram Transport
  Layer Security (DTLS)
text: Verify that the media server is configured to use and support approved Datagram
  Transport Layer Security (DTLS) cipher suites and a secure protection profile for
  the DTLS Extension for establishing keys for the Secure Real-time Transport Protocol
  (DTLS-SRTP).
