title: Secure Real-time Transport Protocol (SRTP) authentication is checked at the
  media server to prevent
text: Verify that Secure Real-time Transport Protocol (SRTP) authentication is checked
  at the media server to prevent Real-time Transport Protocol (RTP) injection attacks
  from leading to either a Denial of Service condition or audio or video media insertion
  into media streams.
