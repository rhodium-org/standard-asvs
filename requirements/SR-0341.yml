title: The media server is not susceptible to the "ClientHello" Race Condition vulnerability
  in Datagram
text: Verify that the media server is not susceptible to the "ClientHello" Race Condition
  vulnerability in Datagram Transport Layer Security (DTLS) by checking if the media
  server is publicly known to be vulnerable or by performing the race condition test.
