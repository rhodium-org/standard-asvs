title: Any audio or video recording mechanisms associated with the media server are
  able to continue
text: Verify that any audio or video recording mechanisms associated with the media
  server are able to continue processing incoming media traffic during a flood of
  Secure Real-time Transport Protocol (SRTP) packets from legitimate users.
