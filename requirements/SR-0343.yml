title: The Datagram Transport Layer Security (DTLS) certificate is checked against
  the Session Description
text: Verify that the Datagram Transport Layer Security (DTLS) certificate is checked
  against the Session Description Protocol (SDP) fingerprint attribute, terminating
  the media stream if the check fails, to ensure the authenticity of the media stream.
